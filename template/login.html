<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — MiniBlog</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #1a1a2e;
            --paper: #f5f0e8;
            --accent: #c0392b;
            --muted: #7f8c8d;
            --border: #d5cfc5;
            --white: #ffffff;
        }
        body {
            background: var(--paper);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: var(--ink);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: var(--paper);
            font-size: 1.4rem;
            text-decoration: none;
        }
        .nav-brand span { color: var(--accent); }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: #bbb;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color .2s;
        }
        .nav-links a:hover { color: var(--paper); }
        .nav-links .btn-nav {
            background: var(--accent);
            color: var(--white) !important;
            padding: 6px 16px;
            border-radius: 4px;
        }

        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .auth-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--ink);
            margin-bottom: 0.3rem;
        }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--ink);
            background: var(--paper);
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus {
            border-color: var(--ink);
            background: var(--white);
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--ink);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .2s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #2c2c4a; }
        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 1.2rem 0;
            color: var(--muted); font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content:''; flex:1; height:1px; background: var(--border);
        }
        .auth-footer {
            text-align: center;
            font-size: 0.88rem;
            color: var(--muted);
        }
        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-brand">Mini<span>Blog</span></a>
    <div class="nav-links">
        <a href="login.html">Kirish</a>
        <a href="register.html" class="btn-nav">Ro'yxatdan o'tish</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-card">
        <h1>Xush kelibsiz</h1>
        <p class="subtitle">Hisobimga kiring</p>

        <form action="dashboard.html" method="GET">
            <div class="form-group">
                <label for="username">Foydalanuvchi nomi</label>
                <input type="text" id="username" name="username"
                       placeholder="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Parol</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Kirish →</button>
        </form>

        <div class="divider">yoki</div>
        <div class="auth-footer">
            Hisobingiz yo'qmi? <a href="register.html">Ro'yxatdan o'ting</a>
        </div>
    </div>
</div>

<footer>&copy; 2025 MiniBlog</footer>
</body>
</html>
